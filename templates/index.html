<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="4399 My Games — Play hundreds of free browser games. Action, Puzzle, Racing, Arcade, Strategy and more!">
  <meta name="theme-color" content="#0d0d1a">

  <!-- Open Graph -->
  <meta property="og:title" content="4399 My Games">
  <meta property="og:description" content="Your ultimate free browser game platform.">
  <meta property="og:type" content="website">

  <title>4399 My Games 🎮 — Play Free Browser Games</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- ==================== HEADER ==================== -->
  <header id="header" role="banner">
    <div class="logo" aria-label="4399 My Games">
      <span class="logo-emoji">🎮</span>
      <span>4399</span>
    </div>

    <div class="search-wrap" role="search">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="search"
        id="search-input"
        class="search-input"
        placeholder="Search games, tags…"
        autocomplete="off"
        spellcheck="false"
        aria-label="Search games"
      >
    </div>

    <nav role="navigation" aria-label="Main navigation">
      <ul class="nav-links">
        <li>
          <a href="#" class="nav-link active" data-target="home" aria-label="Home">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
            Home
          </a>
        </li>
        <li>
          <a href="#" class="nav-link" data-target="categories" aria-label="Categories">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M4 6h16M4 12h16M4 18h7"/>
            </svg>
            Categories
          </a>
        </li>
        <li>
          <a href="#" class="nav-link" data-target="top-rated" aria-label="Top Rated">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
            Top Rated
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <!-- ==================== HERO ==================== -->
  <section id="hero" aria-label="Featured games">
    <!-- Dynamically populated by main.js renderHero() -->
    <div style="display:flex; align-items:center; justify-content:center; height:100%; color:rgba(255,255,255,0.3);">
      <div class="spinner"></div>
    </div>
  </section>

  <!-- ==================== MAIN CONTENT ==================== -->
  <main id="main-content" role="main">

    <!-- Section header -->
    <div class="section-header">
      <h2 class="section-title">
        Browse Games
        <span class="game-count" id="game-count"></span>
      </h2>
    </div>

    <!-- Category Tabs -->
    <div id="category-section">
      <div class="category-scroll" role="tablist" aria-label="Game categories">
        <div id="category-tabs" class="category-tabs">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

    <!-- Games Grid -->
    <section
      id="games-grid"
      class="games-grid"
      aria-live="polite"
      aria-label="Games list"
    >
      <!-- Loading spinner while JS fetches data -->
      <div class="spinner-wrap">
        <div class="spinner" role="status" aria-label="Loading games"></div>
      </div>
    </section>

  </main>

  <!-- ==================== MODAL ==================== -->
  <div
    id="modal-overlay"
    class="modal-overlay"
    role="dialog"
    aria-modal="true"
    aria-label="Game details"
  >
    <div id="modal-panel" class="modal-panel">
      <!-- Populated by JS openModal() -->
    </div>
  </div>

  <!-- ==================== FOOTER ==================== -->
  <footer id="footer" role="contentinfo">
    <div class="footer-logo">4399 🎮</div>
    <p class="footer-copy">&copy; 2025 4399 My Games. All rights reserved.</p>
    <nav class="footer-links" aria-label="Footer navigation">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Contact</a>
    </nav>
  </footer>

  <!-- ==================== SCRIPTS ==================== -->
  <script src="/static/js/main.js" defer></script>

</body>
</html>
